<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucas Smit — Galerij</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f1ede4;
    --ink: #1a1a1a;
    --muted: #6b6356;
    --accent: #c1410b;
    --line: #d4cdbf;
    --paper: #faf7f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 400;
    line-height: 1.5;
    overflow-x: hidden;
    background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.03) 1px, transparent 0);
    background-size: 24px 24px;
  }

  header {
    padding: 4rem 2rem 2rem;
    border-bottom: 1px solid var(--line);
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 2rem;
  }

  .title-block h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(3rem, 8vw, 6.5rem);
    line-height: 0.95;
    letter-spacing: -0.03em;
    font-variation-settings: "opsz" 144;
  }

  .title-block h1 em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-align: right;
  }

  .meta div + div { margin-top: 0.5rem; }

  .intro {
    max-width: 1400px;
    margin: 0 auto;
    padding: 3rem 2rem;
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 4rem;
    align-items: start;
  }

  .intro-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    padding-top: 0.5rem;
  }

  .intro-text {
    font-size: 1.5rem;
    line-height: 1.4;
    font-weight: 300;
    max-width: 50ch;
  }

  .intro-text em {
    font-style: italic;
    color: var(--accent);
  }

  .filters {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
    border-top: 1px solid var(--line);
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 50;
  }

  .filter-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-right: 1rem;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--line);
    padding: 0.5rem 1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 100px;
  }

  .filter-btn:hover { border-color: var(--ink); }

  .filter-btn.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .gallery {
    max-width: 1400px;
    margin: 0 auto;
    padding: 4rem 2rem 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 3rem 2rem;
  }

  .artwork {
    cursor: pointer;
    transition: opacity 0.3s;
    animation: fadeUp 0.6s backwards;
  }

  .artwork:nth-child(3n) { animation-delay: 0.05s; }
  .artwork:nth-child(3n+1) { animation-delay: 0.1s; }
  .artwork:nth-child(3n+2) { animation-delay: 0.15s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .artwork.hidden { display: none; }

  .artwork-frame {
    position: relative;
    background: var(--paper);
    padding: 1.5rem;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.4s;
    overflow: hidden;
  }

  .artwork:hover .artwork-frame {
    transform: translateY(-6px);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 20px 40px rgba(0,0,0,0.12);
  }

  .artwork-image {
    width: 100%;
    aspect-ratio: 4/5;
    object-fit: cover;
    display: block;
    background: var(--bg);
  }

  .artwork-number {
    position: absolute;
    top: 0.5rem;
    left: 0.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .artwork-info {
    padding: 1.25rem 0.25rem 0;
    display: flex;
    justify-content: space-between;
    align-items: start;
    gap: 1rem;
  }

  .artwork-title {
    font-size: 1.1rem;
    font-weight: 400;
    font-style: italic;
    line-height: 1.3;
    flex: 1;
  }

  .badges {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    padding: 0.2rem 0.55rem;
    border-radius: 100px;
    white-space: nowrap;
  }

  .badge.sold { background: var(--accent); color: var(--paper); }

  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(20, 18, 14, 0.92);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .lightbox.active { opacity: 1; pointer-events: auto; }

  .lightbox-content {
    max-width: 1100px;
    width: 100%;
    max-height: 90vh;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 2rem;
    transform: scale(0.96);
    transition: transform 0.3s;
  }

  .lightbox.active .lightbox-content { transform: scale(1); }

  .lightbox-image {
    width: 100%;
    height: 100%;
    max-height: 85vh;
    object-fit: contain;
    background: var(--paper);
  }

  .lightbox-info { color: var(--paper); align-self: center; }

  .lightbox-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 1rem;
  }

  .lightbox-title {
    font-size: 2.5rem;
    font-style: italic;
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 2rem;
  }

  .lightbox-badges { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }

  .lightbox-cta {
    display: inline-block;
    background: var(--paper);
    color: var(--ink);
    padding: 0.75rem 1.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    text-decoration: none;
    border-radius: 100px;
    transition: transform 0.2s;
  }

  .lightbox-cta:hover { transform: translateY(-2px); }

  .lightbox-close {
    position: absolute;
    top: 2rem;
    right: 2rem;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: var(--paper);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .lightbox-close:hover {
    background: rgba(255,255,255,0.1);
    border-color: var(--paper);
  }

  .contact-section {
    background: var(--ink);
    color: var(--paper);
    padding: 6rem 2rem;
    margin-top: 4rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .contact-section::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -10%;
    width: 60%;
    height: 200%;
    background: radial-gradient(ellipse, rgba(193, 65, 11, 0.15), transparent 60%);
    pointer-events: none;
  }

  .contact-inner {
    max-width: 800px;
    margin: 0 auto;
    position: relative;
  }

  .contact-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.5);
    margin-bottom: 2rem;
  }

  .contact-title {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 2.5rem;
  }

  .contact-title em {
    font-style: italic;
    color: var(--accent);
  }

  .contact-btn {
    display: inline-block;
    background: var(--paper);
    color: var(--ink);
    padding: 1.25rem 2.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    text-decoration: none;
    border-radius: 100px;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .contact-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .contact-email {
    margin-top: 2rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.7);
  }

  .contact-email a {
    color: var(--paper);
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    padding-bottom: 2px;
  }

  footer {
    padding: 3rem 2rem;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
  }

  @media (max-width: 768px) {
    .header-inner, .intro {
      grid-template-columns: 1fr;
    }
    .meta { text-align: left; }
    .intro { gap: 1.5rem; }
    .intro-text { font-size: 1.2rem; }
    .lightbox-content { grid-template-columns: 1fr; }
    .lightbox-title { font-size: 1.5rem; }
    .gallery {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 2rem 1rem;
    }
    .filters { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="title-block">
      <h1>Lucas <em>Smit</em></h1>
    </div>
    <div class="meta">
      <div>Een digitale galerij</div>
      <div>Schilderijen</div>
    </div>
  </div>
</header>

<section class="intro">
  <div class="intro-label">— Welkom</div>
  <p class="intro-text">
    Een selectie van mijn <em>schilderijen</em>. Klik op een werk om het in detail te bekijken.
  </p>
</section>

<nav class="filters">
  <span class="filter-label">Filter</span>
  <button class="filter-btn active" data-filter="all">Alles</button>
  <button class="filter-btn" data-filter="available">Beschikbaar</button>
  <button class="filter-btn" data-filter="sold">Verkocht</button>
</nav>

<main class="gallery" id="gallery"></main>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <div class="lightbox-content">
    <img class="lightbox-image" id="lightboxImage" src="" alt="">
    <div class="lightbox-info">
      <div class="lightbox-number" id="lightboxNumber"></div>
      <h2 class="lightbox-title" id="lightboxTitle"></h2>
      <div class="lightbox-badges" id="lightboxBadges"></div>
      <a href="#" class="lightbox-cta" id="lightboxCta">Interesse? Neem contact op</a>
    </div>
  </div>
</div>

<section class="contact-section" id="contact">
  <div class="contact-inner">
    <div class="contact-label">— Contact</div>
    <h2 class="contact-title">Interesse? <em>Neem contact op</em></h2>
    <a href="mailto:lucassmit27@hotmail.com?subject=Interesse%20in%20werk" class="contact-btn">
      Stuur een mail
    </a>
    <p class="contact-email">
      of mail direct naar <a href="mailto:lucassmit27@hotmail.com">lucassmit27@hotmail.com</a>
    </p>
  </div>
</section>

<footer>
  © 2026 — Lucas Smit
</footer>

<script>
  // ============================================
  // JE WERKEN — pas deze lijst aan
  // ============================================
  // Voor elk werk:
  //   title : titel van het werk
  //   image : bestandsnaam
  //   sold  : true (verkocht) of false (beschikbaar)
  // ============================================
  const works = [
{ title: "Jaargetijden", image: "jaargetijden.jpg", sold: false },
{ title: "Pianist", image: "pianist.jpg", sold: false },  
{ title: "Bambi", image: "bambi1.jpg", sold: false },  
{ title: "Bizon", image: "bizon.jpg", sold: true },
{ title: "Boek", image: "boek.jpg", sold: true },
{ title: "Boompje", image: "boompje.jpg", sold: true },
{ title: "Boot", image: "boot.jpg", sold: false },
{ title: "Boot2", image: "boot2.jpg", sold: false }, 
{ title: "Boot3", image: "boot3.jpg", sold: true },
{ title: "Boot4", image: "boot4.jpg", sold: true },  
{ title: "Bos", image: "bos.jpg", sold: true },
{ title: "De drie Vouwtjes", image: "drie vrouwtjes.jpg", sold: true },
{ title: "Boot Ijsselmeer", image: "boot ijselmeer.jpg", sold: true },
{ title: "Broertje", image: "broertje.jpg", sold: true },   
{ title: "Danseres", image: "danseres.jpg", sold: true },
{ title: "Gracht", image: "gracht.jpg", sold: true },
{ title: "Hart", image: "hart.jpg", sold: true },
{ title: "Hert", image: "hert.jpg", sold: false },
{ title: "Het Mannetje", image: "hetmannetje.jpg", sold: true },   
{ title: "Lamme en de Leeuw", image: "lamme en de leeuw.jpg", sold: true },
{ title: "Liora", image: "liora.jpg", sold: true },
{ title: "Merel", image: "merel.jpg", sold: true },
{ title: "Oe Donder", image: "oedonder.jpg", sold: true },
{ title: "Olifant", image: "olifant.jpg", sold: true },
{ title: "Overall", image: "overall.jpg", sold: true },
{ title: "Roos", image: "roos.jpg", sold: true },
{ title: "Saxofonist", image: "saxofonist.jpg", sold: true },
{ title: "Schaap", image: "schaap.jpg", sold: true },
{ title: "Skelet", image: "skelet.jpg", sold: true },
{ title: "Strand", image: "strand.jpg", sold: true },
{ title: "Strand1", image: "strand1.jpg", sold: true },
{ title: "Vrouwtjes", image: "vrouwtjes.jpg", sold: true },
  ];

  // ============================================
  // Geen aanpassingen nodig hieronder
  // ============================================

  const gallery = document.getElementById('gallery');
  const lightbox = document.getElementById('lightbox');
  const lightboxImage = document.getElementById('lightboxImage');
  const lightboxTitle = document.getElementById('lightboxTitle');
  const lightboxNumber = document.getElementById('lightboxNumber');
  const lightboxBadges = document.getElementById('lightboxBadges');
  const lightboxCta = document.getElementById('lightboxCta');
  const lightboxClose = document.getElementById('lightboxClose');

  function pad(n) { return String(n).padStart(3, '0'); }

  function buildBadges(work) {
    return work.sold ? '<span class="badge sold">Verkocht</span>' : '';
  }

  function renderGallery() {
    gallery.innerHTML = works.map((work, i) => `
      <article class="artwork" data-index="${i}" data-sold="${work.sold}">
        <div class="artwork-frame">
          <span class="artwork-number">№ ${pad(i + 1)}</span>
          <img class="artwork-image" src="${work.image}" alt="${work.title}" loading="lazy">
        </div>
        <div class="artwork-info">
          <h3 class="artwork-title">${work.title}</h3>
          <div class="badges">${buildBadges(work)}</div>
        </div>
      </article>
    `).join('');

    document.querySelectorAll('.artwork').forEach(el => {
      el.addEventListener('click', () => openLightbox(parseInt(el.dataset.index)));
    });
  }

  function openLightbox(index) {
    const work = works[index];
    lightboxImage.src = work.image;
    lightboxImage.alt = work.title;
    lightboxTitle.textContent = work.title;
    lightboxNumber.textContent = `Werk № ${pad(index + 1)}`;
    lightboxBadges.innerHTML = buildBadges(work);

    const subject = encodeURIComponent(`Interesse in: ${work.title}`);
    lightboxCta.href = `mailto:lucassmit27@hotmail.com?subject=${subject}`;

    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
  }

  lightboxClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filter = btn.dataset.filter;
      document.querySelectorAll('.artwork').forEach(art => {
        const sold = art.dataset.sold === 'true';
        let show = true;
        if (filter === 'available') show = !sold;
        else if (filter === 'sold') show = sold;
        art.classList.toggle('hidden', !show);
      });
    });
  });

  renderGallery();
</script>

</body>
</html>
